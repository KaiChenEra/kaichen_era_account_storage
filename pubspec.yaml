name: kaichen_era_account_storage
description: Account-scoped storage primitives (SharedPreferences + Keychain facade) shared by KaiChenEra suite (scoped key + account scope + migration helpers).
version: 0.0.2
publish_to: none

environment:
  sdk: ^3.6.0
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.0.0
  flutter_secure_storage: ^10.1.0
  meta: ^1.15.0
  path: ^1.9.0
  path_provider: ^2.1.4
  shared_preferences: ^2.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  lints: ^5.0.0
  path_provider_platform_interface: ^2.1.2
